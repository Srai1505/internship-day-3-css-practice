
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Example</title>
    <style>
        .container{
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap
             gap 20px;
           justify-content :space-evenly;
        }
        .circle{
            width: 220px;
            height: 220px;
            border: 2px solid black;
           border-radius: 50%;
           overflow: hidden;
        }
.circle img{
    width: 100%;
height: 100%;
object-fit: cover;
}
    </style>
</head>
<body>
    <div class="container">
        <div class="circle">
            <img src="img2.png" alt="">
        </div>
        <div class="circle">
            <img src="img2.png" alt="">
        </div>
        <div class="circle">
            <img src="img2.png" alt="">
        </div>
        <div class="circle">
            <img src="img2.png" alt="">
        </div>
        <div class="circle">
            <img src="img2.png" alt="">
        </div>

        </div>

</body>
</html>
